<!DOCTYPE html>
<html>
<head>
    <title>Room Expense Manager - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1cc88a, #4e73df);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-card {
            width: 450px;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            background: white;
        }

        .title {
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
            color: #1cc88a;
        }
    </style>
</head>
<body>

<div class="register-card">

    <h2 class="title">Create Account</h2>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-warning text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- Register Form -->
    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Select Your Name</label>
            <select name="person_name" class="form-select" required>
                <option value="">Select Your Name</option>
                <option value="Kunal Rahangdale">Kunal Rahangdale</option>
                <option value="Himanshu Rahangdale">Himanshu Rahangdale</option>
                <option value="Ashish Jaitwar">Ashish Jaitwar</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success w-100">Register</button>
    </form>

    <hr>

    <!-- Links -->
    <div class="text-center">
        <a href="/login" class="d-block mb-2">Already have an account? Login</a>
        <a href="/create-password" class="d-block">Forgot / Create Password</a>
    </div>

</div>

</body>
</html>
