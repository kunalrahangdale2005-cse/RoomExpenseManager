<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <h2 class="text-center mb-4">
                Register
            </h2>

            <form method="POST">

                <div class="mb-3">
                    <label>Username</label>
                    <input type="text"
                           name="username"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    <input type="password"
                           name="password"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Select Your Name</label>

                    <select name="person_name"
                            class="form-select"
                            required>

                        <option value="">
                            Select Your Name
                        </option>

                        <option value="Kunal Rahangdale">
                            Kunal Rahangdale
                        </option>

                        <option value="Himanshu Rahangdale">
                            Himanshu Rahangdale
                        </option>

                        <option value="Ashish Jaitwar">
                            Ashish Jaitwar
                        </option>

                    </select>
                </div>

                <button type="submit"
                        class="btn btn-primary w-100">
                    Register
                </button>

            </form>

            <div class="text-center mt-3">
                <a href="/login">
                    Already have an account? Login
                </a>
            </div>

        </div>
    </div>

</body>
</html>
