```html
<!DOCTYPE html>
<html>
<head>
    <title>Room Expense Manager - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#4e73df,#1cc88a);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:400px;
            padding:35px;
            border-radius:20px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.2);
            background:white;
        }

        .title{
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
            color:#4e73df;
        }
    </style>
</head>

<body>

<div class="login-card">

    <h2 class="title">
        Room Expense Manager
    </h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-warning">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">
                Username
            </label>

            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Enter Username"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">
                Password
            </label>

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Enter Password"
                   required>
        </div>

        <button type="submit"
                class="btn btn-primary w-100">
            Login
        </button>

    </form>

    <hr>

    <div class="text-center">
        <a href="/register">
            Create New Account
        </a>
    </div>

</div>

</body>
</html>
```
